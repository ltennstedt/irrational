---
name: Java CI with Gradle
"on":
  push:
    branches:
    - main
    paths-ignore:
    - .editorconfig
    - .gitignore
    - .gitattributes
    - LICENSE
    - '**/*.md'
  pull_request:
    branches:
    - main
    paths-ignore:
    - .editorconfig
    - .gitignore
    - .gitattributes
    - LICENSE
    - '**/*.md'
jobs:
  build:
    permissions:
      actions: write
      contents: read
      id-token: write
      packages: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: temurin
        cache: gradle
    - name: Wrapper
      run: gradle wrapper
    - name: Cleaning
      run: ./gradlew clean
    - name: Compilation
      run: ./gradlew classes testClasses
    - name: Testing
      run: ./gradlew test
    - name: Assembling
      run: ./gradlew assemble
    - name: Checking
      run: ./gradlew check
    - name: Publishing
      env:
        GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
      run: ./gradlew publish
    - name: DeepSource
      env:
        DEEPSOURCE_DSN: "${{ secrets.DEEPSOURCE_DSN }}"
      run: |
        curl https://deepsource.com/cli | sh
        ./bin/deepsource report --analyzer test-coverage --key java --value-file ./build/reports/jacoco/test/jacocoTestReport.xml
    - name: Deleting old workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        retain_days: 1
